    <script>
      (function() {
        // Set language attribute
        document.documentElement.setAttribute('lang', 'en-ZA');

        // Service workers can interfere with Vite dev HMR.
        const LOCAL_HOSTNAMES = ['localhost', '127.0.0.1', '::1'];
        const isLocalDev = LOCAL_HOSTNAMES.includes(window.location.hostname);
        if ('serviceWorker' in navigator && isLocalDev) {
          // Immediate cleanup of any existing service workers
          if (navigator.serviceWorker.controller) {
            console.log('SW controller detected, unregistering...');
            navigator.serviceWorker.controller.postMessage({ type: 'UNREGISTER' });
          }

          navigator.serviceWorker.getRegistrations()
            .then((registrations) => {
              if (registrations.length > 0) {
                console.log(`Found ${registrations.length} SW registrations, unregistering...`);
                return Promise.all(registrations.map((registration) => registration.unregister()));
              }
            })
            .then(() => {
              console.log('Local SW cleanup complete');
              if (navigator.serviceWorker.controller && !sessionStorage.getItem('swCleanupReloaded')) {
                sessionStorage.setItem('swCleanupReloaded', 'true');
                console.log('Reloading page to clear SW controller...');
                window.location.reload();
              }
            })
            .catch((err) => console.warn('Local SW cleanup failed:', err));
        }
      })();
    </script>

    <script>
      (function() {
